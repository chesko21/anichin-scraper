name: Auto Scrape & Update Data

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper (with retry)
        run: |
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "Scrape attempt $attempt/$max_attempts..."
            if npm run scrape; then
              echo "Scrape succeeded!"
              break
            else
              echo "Scrape failed. Waiting before retry..."
              sleep 30
              attempt=$((attempt + 1))
            fi
          done
          
          if [ $attempt -gt $max_attempts ]; then
            echo "All scrape attempts failed."
            # Fail the job if no data exists yet
            if [ ! -f public/data/all.json ]; then
              echo "No existing data found. Failing."
              exit 1
            else
              echo "Using existing data files."
            fi
          fi
        timeout-minutes: 15

      - name: Commit & push scraped data
        run: |
          git config --global user.name 'Auto Scraper Bot'
          git config --global user.email 'bot@anichin-scraper.vercel.app'
          git add public/data/
          
          # Only commit if there are changes
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update data $(date +'%Y-%m-%d %H:%M')"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/chesko21/anichin-scraper.git
          fi